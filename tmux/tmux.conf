# ── General ───────────────────────────────────────────────────────────────────

set -g default-command fish
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"   # true colour passthrough
set -ga update-environment COLORTERM          # propagate COLORTERM into panes

set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # keep window numbers contiguous
set -g escape-time 10         # faster escape (helps neovim)
set -g focus-events on
set -g history-limit 50000
set -g mouse on

# ── Keybindings ───────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes, open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ────────────────────────────────────────────────────────────

setw -g mode-keys vi

bind v copy-mode
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#161616,fg=#b6b8bb"

set -g status-left " #S "
set -g status-left-style "bg=#282828,fg=#f2f4f8,bold"
set -g status-left-length 20

set -g status-right-length 80
set -g status-right "#[fg=#b6b8bb] #(echo #{pane_current_path} | sed \"s|$HOME|~|\") #[fg=#f2f4f8,bg=#282828] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '—') "

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#282828,fg=#f2f4f8,bold"

set -g pane-border-style "fg=#353535"
set -g pane-active-border-style "fg=#78a9ff"
set -g message-style "bg=#282828,fg=#f2f4f8"
