"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = "$directory$git_branch$git_status "

[directory]
truncation_length = 1
format = "[$path]($style) "

[git_branch]
format = "[$branch]($style) "

[git_status]
format = "[$all_status$ahead_behind]($style) "
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "x"
